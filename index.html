<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ Bangwook HVDC man ⚡</title>
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
      }
    }
    </script>
    <style>
        :root { --main-color: #00f2ff; --bg-color: #050508; --enemy-color: #ff2d55; }
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 177.78vw; max-width: 500px; max-height: 888px; background: var(--bg-color); overflow: hidden; border: 1px solid #1a1a2e; }
        canvas { width: 100%; height: 100%; display: block; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; text-align: center; }
        .blur-bg { background: rgba(5, 5, 8, 0.85); backdrop-filter: blur(10px); }
        #xp-bar-container { position: absolute; top: 0; left: 0; width: 100%; height: 10px; background: rgba(255,255,255,0.05); z-index: 50; }
        #xp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--main-color), #7000ff); box-shadow: 0 0 15px var(--main-color); transition: width 0.3s ease-out; }
        .stat-label { position: absolute; top: 22px; left: 20px; color: var(--main-color); font-weight: bold; z-index: 50; font-size: 14px; }
        button { padding: 15px 40px; font-size: 1.1rem; background: transparent; border: 2px solid var(--main-color); border-radius: 8px; color: var(--main-color); font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:active { background: var(--main-color); color: #000; }
        .upgrade-btn { width: 85%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.3); margin: 8px; padding: 20px; border-radius: 12px; font-size: 1.1rem; color: #fff; }
        h1 { font-size: 2.8rem; color: #fff; text-shadow: 0 0 15px var(--main-color); margin: 0; font-weight: 900; line-height: 1.2; }
        .score-display { font-size: 3rem; font-weight: bold; color: var(--main-color); margin: 5px 0; }
        #leaderboard-list { width: 85%; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; font-size: 0.9rem; margin-top: 15px; }
        .rank-item { display: flex; justify-content: space-between; margin: 4px 0; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #player-name { padding: 10px; border-radius: 5px; border: 1px solid var(--main-color); background: #000; color: #fff; text-align: center; margin-bottom: 10px; width: 140px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="xp-bar-container"><div id="xp-bar"></div></div>
    <div class="stat-label">LV. <span id="ui-lvl">1</span> | 점수: <span id="ui-kills">0</span></div>

    <div id="start-screen" class="overlay" style="background: var(--bg-color);">
        <p style="color: var(--main-color); margin-bottom: 5px; letter-spacing: 3px;">고압 전류 가동 준비</p>
        <h1>BANGWOOK<br>HVDC MAN</h1>
        <button id="btn-start">게임 시작</button>
    </div>

    <div id="upgrade-menu" class="overlay blur-bg" style="display:none">
        <h3 style="font-size: 1.8rem; color: var(--main-color); margin-bottom: 20px;">모듈 업그레이드 선택</h3>
        <button class="upgrade-btn" data-type="as">⚡ 공격 속도 증가</button>
        <button class="upgrade-btn" data-type="range">🌀 연쇄 범위 증가</button>
        <button class="upgrade-btn" data-type="spd">🏃 이동 속도 증가</button>
    </div>

    <div id="game-over" class="overlay blur-bg" style="display:none">
        <h2 style="color: var(--enemy-color); font-size: 2.2rem; margin: 0;">시스템 과부하</h2>
        <div class="score-display" id="final-score">0</div>
        <div id="save-area">
            <input type="text" id="player-name" placeholder="닉네임" maxlength="8">
            <button id="btn-save" style="margin-top:0; padding: 10px 20px; font-size: 0.9rem;">점수 기록</button>
        </div>
        <div id="leaderboard-list">
            <div id="rank-items">순위표 불러오는 중...</div>
        </div>
        <button id="btn-restart" style="margin-top: 15px; padding: 10px 30px;">재시작</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, set, push, onValue, query, orderByChild, limitToLast } from "firebase/database";

    const firebaseConfig = {
        apiKey: "AIzaSyA7ut0Tm4qr4dGI3QnJD8kDREWgvKOhljA",
        authDomain: "bangwook-hvdc-man.firebaseapp.com",
        projectId: "bangwook-hvdc-man",
        storageBucket: "bangwook-hvdc-man.firebasestorage.app",
        messagingSenderId: "294360346215",
        appId: "1:294360346215:web:573eb77863ef1b66422ec2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 540; canvas.height = 960;

    let gameState = 'start';
    let player = { x: 270, y: 700, r: 18, spd: 3.2, lvl: 1, xp: 0, nextXp: 5 };
    let enemies = []; let gems = []; let lightningChains = [];
    let score = 0; let shakeTime = 0; let lastAttackTime = 0; let spawnTimer = 0;
    let stats = { attackSpeed: 3000, chainRange: 160, chainCount: 3 };
    let joystick = { active: false, originX: 0, originY: 0, currX: 0, currY: 0, maxDist: 85, moveVec: { x: 0, y: 0 } };

    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
    };

    // 터치/마우스 이벤트
    const startInput = (e) => { if(gameState==='play') { const p = getPos(e); joystick.active=true; joystick.originX=p.x; joystick.originY=p.y; } };
    const moveInput = (e) => { if(joystick.active) { if(e.touches) e.preventDefault(); const p = getPos(e); const dx=p.x-joystick.originX, dy=p.y-joystick.originY, d=Math.hypot(dx,dy); const pow=Math.min(d, joystick.maxDist)/joystick.maxDist; joystick.moveVec={x:(dx/d)*pow, y:(dy/d)*pow}; } };
    const endInput = () => { joystick.active=false; joystick.moveVec={x:0, y:0}; };

    window.addEventListener('touchstart', startInput, {passive:false});
    window.addEventListener('touchmove', moveInput, {passive:false});
    window.addEventListener('touchend', endInput);
    window.addEventListener('mousedown', startInput);
    window.addEventListener('mousemove', moveInput);
    window.addEventListener('mouseup', endInput);

    // 버튼 이벤트 리스너 (인라인 onclick 대신 사용)
    document.getElementById('btn-start').addEventListener('click', () => {
        document.getElementById('start-screen').style.display='none';
        gameState='play'; lastAttackTime=performance.now(); requestAnimationFrame(loop);
    });

    document.querySelectorAll('.upgrade-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const type = btn.getAttribute('data-type');
            if(type==='as') stats.attackSpeed = Math.max(300, stats.attackSpeed*0.75);
            if(type==='range') { stats.chainRange+=40; stats.chainCount+=2; }
            if(type==='spd') player.spd += 0.8;
            document.getElementById('upgrade-menu').style.display='none';
            gameState='play'; lastAttackTime=performance.now();
        });
    });

    document.getElementById('btn-restart').addEventListener('click', () => location.reload());

    document.getElementById('btn-save').addEventListener('click', () => {
        const name = document.getElementById('player-name').value.trim() || "익명";
        if(score <= 0) return;
        push(ref(db, 'leaderboard'), { name, score, timestamp: Date.now() }).then(() => {
            alert("기록 완료!"); document.getElementById('save-area').style.display='none';
        });
    });

    // 렌더링 및 로직
    function drawWiz(x, y) {
        ctx.save(); ctx.shadowBlur=15; ctx.shadowColor='#00f2ff'; ctx.fillStyle='#4ecca3'; ctx.beginPath(); ctx.arc(x,y,18,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#1a1a2e'; ctx.beginPath(); ctx.moveTo(x-24,y-2); ctx.lineTo(x+24,y-2); ctx.lineTo(x,y-45); ctx.fill();
        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x-7,y-3,3,0,Math.PI*2); ctx.arc(x+7,y-3,3,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#754a1d'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(x+18,y+10); ctx.lineTo(x+25,y-15); ctx.stroke();
        ctx.restore();
    }

    function drawMon(x, y) {
        ctx.save(); ctx.shadowBlur=10; ctx.shadowColor='#ff2d55'; ctx.fillStyle='#ff2d55'; ctx.beginPath(); ctx.ellipse(x,y,18,16,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='white'; ctx.beginPath(); ctx.moveTo(x-12,y-8); ctx.lineTo(x-4,y-4); ctx.lineTo(x-12,y-2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x+12,y-8); ctx.lineTo(x+4,y-4); ctx.lineTo(x+12,y-2); ctx.fill(); ctx.restore();
    }

    function startChain(startX, startY, target, count) {
        if(!target || count <= 0) return;
        lightningChains.push({ x1: startX, y1: startY, x2: target.x, y2: target.y, life: 12 });
        const idx = enemies.indexOf(target);
        if(idx > -1) {
            gems.push({x: target.x, y: target.y}); enemies.splice(idx,1); score++;
            document.getElementById('ui-kills').innerText = score;
            setTimeout(() => {
                let next = null; let minD = stats.chainRange;
                enemies.forEach(e => { const d=Math.hypot(e.x-target.x, e.y-target.y); if(d<minD){minD=d; next=e;} });
                if(next) startChain(target.x, target.y, next, count-1);
            }, 60);
        }
    }

    function loop(time) {
        if(gameState === 'over') return;
        ctx.save(); if(shakeTime>0){ ctx.translate(Math.random()*8-4, Math.random()*8-4); shakeTime--; }
        ctx.clearRect(0,0,canvas.width,canvas.height);
        
        ctx.strokeStyle='#111'; ctx.lineWidth=2;
        for(let i=0;i<canvas.width;i+=60){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,canvas.height);ctx.stroke();}
        for(let i=0;i<canvas.height;i+=60){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(canvas.width,i);ctx.stroke();}

        drawWiz(player.x, player.y);
        if(joystick.active) {
            ctx.beginPath(); ctx.arc(joystick.originX, joystick.originY, joystick.maxDist, 0, Math.PI*2); ctx.strokeStyle="rgba(0,242,255,0.1)"; ctx.stroke();
            ctx.beginPath(); ctx.arc(joystick.originX+joystick.moveVec.x*joystick.maxDist, joystick.originY+joystick.moveVec.y*joystick.maxDist, 30,0,Math.PI*2); ctx.fillStyle="rgba(0,242,255,0.3)"; ctx.fill();
        }

        enemies.forEach(e => drawMon(e.x, e.y));
        gems.forEach(g => { ctx.fillStyle='#00f2ff'; ctx.beginPath(); ctx.arc(g.x,g.y,5,0,Math.PI*2); ctx.fill(); });

        ctx.strokeStyle='#fff'; ctx.lineWidth=4; ctx.shadowBlur=20; ctx.shadowColor='#00f2ff';
        lightningChains.forEach((l,i) => {
            ctx.beginPath(); ctx.moveTo(l.x1,l.y1); ctx.lineTo((l.x1+l.x2)/2+(Math.random()*40-20), (l.y1+l.y2)/2+(Math.random()*40-20)); ctx.lineTo(l.x2,l.y2); ctx.stroke();
            if(gameState==='play') l.life--; if(l.life<=0) lightningChains.splice(i,1);
        }); ctx.shadowBlur=0;

        if(gameState === 'play') {
            if(time > spawnTimer) {
                const side=Math.floor(Math.random()*4); let x,y;
                if(side===0){x=Math.random()*canvas.width; y=-50;} else if(side===1){x=Math.random()*canvas.width; y=canvas.height+50;}
                else if(side===2){x=-50; y=Math.random()*canvas.height;} else {x=canvas.width+50; y=Math.random()*canvas.height;}
                enemies.push({x, y, r:16, spd: 1.1 + (score*0.005)});
                spawnTimer = time + Math.max(200, 800 - (score*2));
            }
            player.x = Math.max(20, Math.min(canvas.width-20, player.x + joystick.moveVec.x*player.spd));
            player.y = Math.max(20, Math.min(canvas.height-20, player.y + joystick.moveVec.y*player.spd));

            if(time - lastAttackTime > stats.attackSpeed) {
                if(enemies.length > 0) {
                    let target=enemies[0], minD=Infinity;
                    enemies.forEach(e=>{const d=Math.hypot(e.x-player.x, e.y-player.y); if(d<minD){minD=d; target=e;}});
                    startChain(player.x, player.y, target, stats.chainCount); shakeTime=6;
                }
                lastAttackTime = time;
            }

            enemies.forEach(e => {
                const a=Math.atan2(player.y-e.y, player.x-e.x); e.x+=Math.cos(a)*e.spd; e.y+=Math.sin(a)*e.spd;
                if(Math.hypot(player.x-e.x, player.y-e.y) < player.r+14) {
                    gameState='over'; document.getElementById('game-over').style.display='flex';
                    document.getElementById('final-score').innerText = score;
                    onValue(query(ref(db, 'leaderboard'), orderByChild('score'), limitToLast(5)), (snap) => {
                        const d = snap.val(); if(!d) return;
                        const sorted = Object.values(d).sort((a,b)=>b.score-a.score);
                        document.getElementById('rank-items').innerHTML = sorted.map((i,idx)=>`<div class="rank-item"><span>${idx+1}. ${i.name}</span><span>${i.score}점</span></div>`).join('');
                    });
                }
            });

            gems.forEach((g,i) => {
                const d=Math.hypot(player.x-g.x, player.y-g.y);
                if(d<120){ g.x+=(player.x-g.x)*0.2; g.y+=(player.y-g.y)*0.2; }
                if(d<25){
                    player.xp++; gems.splice(i,1);
                    document.getElementById('xp-bar').style.width = Math.min(100, (player.xp/player.nextXp)*100)+'%';
                    if(player.xp >= player.nextXp) {
                        player.xp=0; player.lvl++; player.nextXp += 5;
                        document.getElementById('ui-lvl').innerText=player.lvl;
                        gameState='upgrade'; document.getElementById('upgrade-menu').style.display='flex';
                    }
                }
            });
        }
        ctx.restore(); requestAnimationFrame(loop);
    }
</script>
</body>
</html>
